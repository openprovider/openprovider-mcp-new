version: '3.9'
services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: openprovider
      POSTGRES_PASSWORD: dev
      POSTGRES_DB: openprovider_mcp
    ports: ['5432:5432']
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U openprovider']
      interval: 5s
      timeout: 5s
      retries: 10
  fake-gcs:
    image: fsouza/fake-gcs-server:1.49
    command: ['-scheme', 'http', '-port', '4443']
    ports: ['4443:4443']
    healthcheck:
      test: ['CMD', 'curl', '-f', 'http://localhost:4443/storage/v1/b']
      interval: 5s
      timeout: 5s
      retries: 10
